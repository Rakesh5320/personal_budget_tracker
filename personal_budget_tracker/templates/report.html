<!DOCTYPE html>
<html>

<head>

<title>Expense Reports</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="page-card">

<h2 class="page-title">Expense Reports</h2>

<!-- FILTER BUTTONS -->

<div class="report-controls">

<a href="/report?filter=daily">
<button class="btn btn-filter">Daily</button>
</a>

<a href="/report?filter=weekly">
<button class="btn btn-filter">Weekly</button>
</a>

<a href="/report?filter=monthly">
<button class="btn btn-filter">Monthly</button>
</a>

<a href="/export_excel">
<button class="btn btn-export">⬇ Export to Excel</button>
</a>

<a href="/export_pdf">
<button class="btn btn-export">⬇ Export PDF</button>
</a>

</div>

<br>

<div class="report-summary">

<h3>Income : ₹ {{income}}</h3>
<h3>Expense : ₹ {{expense}}</h3>

</div>

<div class="chart-container">

<canvas id="reportChart"></canvas>

</div>

<br>

<div style="text-align:center;">
<a href="/dashboard">
<button class="btn btn-back">⬅ Back to Dashboard</button>
</a>
</div>

</div>

<script>

var income = {{income}};
var expense = {{expense}};

new Chart(document.getElementById("reportChart"), {

type: "bar",

data: {

labels: ["Income","Expense"],

datasets: [{
label: "Report",
data: [income,expense],
backgroundColor:["#2ecc71","#e74c3c"]
}]

},

options:{
responsive:true,
maintainAspectRatio:false
}

});

</script>

</body>
</html>
